<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZipMe</title>
  <link rel="icon" type="image/x-icon" href="upload.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="main-header">
      <h1 class="logo">ZipMe</h1>
      <div class="header-controls">
        <div class="search-wrapper">
          <input type="text" id="textSearch" placeholder="Search messages..." aria-label="Search messages" class="search-input">
          <span id="searchCount" class="search-count" style="display:none;"></span>
          <button id="searchPrev" class="search-nav-btn" style="display:none;" aria-label="Previous result">↑</button>
          <button id="searchNext" class="search-nav-btn" style="display:none;" aria-label="Next result">↓</button>
        </div>
        <input type="date" id="dateSearch" aria-label="Filter by date">
        <button id="toggleSidebar" aria-label="Toggle analytics sidebar">Analytics</button>
      </div>
    </header>

    <div class="main-content">
      <!-- Sidebar with Analytics -->
      <aside id="sidebar" class="sidebar" role="complementary">
        <div class="sidebar-header">
          <h2 style="margin: 0; font-size: 18px;">Chat Analytics</h2>
          <button id="closeSidebar" aria-label="Close sidebar">×</button>
        </div>
        <div class="analytics-section">
          <article class="stat-card">
            <h3 style="margin: 0 0 12px 0; font-size: 15px;">Most Used Words</h3>
            <div id="wordStats"></div>
          </article>
          <article class="stat-card">
            <h3 style="margin: 0 0 12px 0; font-size: 15px;">Most Used Emojis</h3>
            <div id="emojiStats"></div>
          </article>
          <article class="stat-card">
            <h3 style="margin: 0 0 12px 0; font-size: 15px;">Response Times</h3>
            <div id="responseStats"></div>
          </article>
          <article class="stat-card">
            <h3 style="margin: 0 0 12px 0; font-size: 15px;">Chat Summary</h3>
            <div id="chatSummary"></div>
          </article>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main class="chat-area">
        <!-- Upload Section -->
        <div class="upload-section">
          <div class="upload-in">
            <img src="upload.svg" alt="" srcset="">
            <input type="file" id="zipInput" accept=".zip,.txt" hidden aria-label="Upload chat file">
            <label for="zipInput">Upload Chat File (ZIP or TXT)</label>
            <span id="fileName" class="file-name" role="status"></span>
          </div>
          <button id="goBtn" aria-label="Load and analyze chat" disabled>Load Chat</button>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay displayNone" role="status" aria-live="polite">
          <div class="loader">⏳ Loading & Analyzing Chat...</div>
        </div>

        <!-- Chat Display Area -->
        <div class="chat-wrapper displayNone" role="region" aria-label="Chat messages">
          <div class="chat-header">
            <div class="user-left" id="leftUser"></div>
            <div class="user-right" id="rightUser"></div>
          </div>
          <div id="chatContainer" class="chat-container"></div>
          <button id="scrollToBottomBtn" class="scroll-btn" aria-label="Scroll to bottom">↓</button>
        </div>
      </main>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
